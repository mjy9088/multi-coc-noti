services:
  db:
    image: postgres:17-alpine
    env_file:
      - path: docker/.env
        required: true
    environment:
      POSTGRES_DB: multi_coc
      POSTGRES_USER: coc
    volumes:
      - coc-db:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coc -d multi_coc"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    environment:
      PORT: 3001
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: multi_coc
      PGUSER: coc
    env_file:
      - path: docker/.env
        required: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: services
    command: ["node", "packages/reverse-proxy/src/server.ts"]
    environment:
      PORT: 3000
      DASHBOARD_UPSTREAM: http://dashboard:3001
      COLLECTOR_UPSTREAM: http://collector:8787
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      dashboard:
        condition: service_healthy
      collector:
        condition: service_healthy
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: services
    command: ["node", "packages/collector/src/server.ts"]
    env_file:
      - path: docker/.env
        required: false
    environment:
      PORT: 8787
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: multi_coc
      PGUSER: coc
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  notifier:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: services
    command: ["node", "packages/notifier/src/notifier.ts"]
    env_file:
      - path: docker/.env
        required: false
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: multi_coc
      PGUSER: coc
    depends_on:
      db:
        condition: service_healthy
      collector:
        condition: service_healthy
    restart: unless-stopped

volumes:
  coc-db:
